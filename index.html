<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS — Claudiatyx</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f8fafc; color: #111827; }
    input, select, textarea, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;



// ─── Constants ────────────────────────────────────────────────────────────────
const STAGES = [
  { id: "lead",        label: "Lead",           color: "#a78bfa", bg: "#f5f3ff", dot: "#7c3aed" },
  { id: "prospecting", label: "Prospecting",    color: "#60a5fa", bg: "#eff6ff", dot: "#2563eb" },
  { id: "discovery",  label: "Discovery Appt",  color: "#34d399", bg: "#ecfdf5", dot: "#059669" },
  { id: "proposal",   label: "Proposal",        color: "#fbbf24", bg: "#fffbeb", dot: "#d97706" },
  { id: "closing",    label: "Closing",         color: "#fb923c", bg: "#fff7ed", dot: "#ea580c" },
  { id: "client",     label: "Client",          color: "#4ade80", bg: "#f0fdf4", dot: "#16a34a" },
  { id: "ghosted",    label: "Ghosted",         color: "#94a3b8", bg: "#f8fafc", dot: "#64748b" },
  { id: "followup",   label: "To Follow Up",    color: "#f472b6", bg: "#fdf2f8", dot: "#db2777" },
  { id: "notapproached", label: "Not Approached", color: "#e2e8f0", bg: "#f8fafc", dot: "#94a3b8" },
];

const TIERS = [
  { id: "silver",  label: "Silver",  color: "#94a3b8", bg: "#f8fafc", dot: "#64748b", icon: "🥈" },
  { id: "gold",    label: "Gold",    color: "#fbbf24", bg: "#fffbeb", dot: "#d97706", icon: "🥇" },
  { id: "diamond", label: "Diamond", color: "#60a5fa", bg: "#eff6ff", dot: "#2563eb", icon: "💎" },
];

const RELATIONS = ["Spouse","Parent","Child","Sibling","Grandparent","Grandchild","In-law","Uncle/Aunt","Nephew/Niece","Cousin","Friend","Colleague","Other"];

const EMPTY_PERSON = {
  id: null, name: "", birthday: "", ageOnly: "", contact: "", howKnow: "", keyPeople: "",
  occupation: "", keyMilestones: "", stage: "lead",
  followUpTopic: "", followUpDate: "", lastMeetup: "", notes: "",
  referredById: null, tier: null, familyId: null, inLibrary: true, lastUpdated: null,
  emergencyContacts: [{name:"",relation:"",contact:""},{name:"",relation:"",contact:""},{name:"",relation:"",contact:""}],
  policySummaryLink: "", policies: [],
};
const EMPTY_POLICY = { name: "", purchaseDate: "", category: "" };
const POLICY_CATEGORIES = ["Insurance", "Accumulation", "Retirement", "Legacy"];
function POLICY_CAT_COLOR(cat) {
  return {
    Insurance:    {bg:"#fef2f2",dot:"#b91c1c",border:"#fecaca"},
    Accumulation: {bg:"#eff6ff",dot:"#1d4ed8",border:"#bfdbfe"},
    Retirement:   {bg:"#f0fdf4",dot:"#15803d",border:"#bbf7d0"},
    Legacy:       {bg:"#fdf4ff",dot:"#7e22ce",border:"#e9d5ff"},
  }[cat] || {bg:"#f3f4f6",dot:"#6b7280",border:"#e5e7eb"};
}

// Family members not in the main library (just for tree)
const EMPTY_FAMILY_MEMBER = {
  id: null, name: "", age: "", occupation: "", relation: "Spouse",
  stage: "notapproached", notes: "", familyId: null, inLibrary: false,
};

const EMPTY_FAMILY = { id: null, name: "", notes: "" };

// ─── Sample data ──────────────────────────────────────────────────────────────
const SAMPLE_FAMILIES = [];
const SAMPLE_PEOPLE = [];

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmt(d) {
  if (!d) return "—";
  return new Date(d + "T12:00:00").toLocaleDateString("en-SG", { day: "numeric", month: "short", year: "numeric" });
}
function daysTo(d) {
  if (!d) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.round((new Date(d+"T00:00:00")-t)/86400000);
}
function getAge(p) {
  if (p.birthday) {
    const b = new Date(p.birthday); const today = new Date();
    let age = today.getFullYear() - b.getFullYear();
    if (today.getMonth() < b.getMonth() || (today.getMonth()===b.getMonth() && today.getDate()<b.getDate())) age--;
    return age;
  }
  return p.ageOnly ? Number(p.ageOnly) : null;
}
function fmtBirthday(p) {
  if (p.birthday) return new Date(p.birthday+"T12:00:00").toLocaleDateString("en-SG",{day:"numeric",month:"short",year:"numeric"});
  if (p.ageOnly) return `${p.ageOnly}y`;
  return null;
}
function upcomingBirthday(birthday) {
  if (!birthday) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const b = new Date(birthday);
  let next = new Date(today.getFullYear(), b.getMonth(), b.getDate());
  if (next < today) next = new Date(today.getFullYear()+1, b.getMonth(), b.getDate());
  return Math.round((next-today)/86400000);
}
function Avatar({ name, size=40 }) {
  const initials = name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const hue = name.split("").reduce((a,c)=>a+c.charCodeAt(0),0)%360;
  return <div style={{width:size,height:size,borderRadius:"50%",background:`hsl(${hue},55%,88%)`,color:`hsl(${hue},45%,35%)`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:size*0.35,flexShrink:0}}>{initials}</div>;
}
function Badge({ date }) {
  const d = daysTo(date);
  if (d===null) return null;
  if (d<0) return <span style={{background:"#fef2f2",color:"#b91c1c",border:"1px solid #fecaca",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>Overdue {Math.abs(d)}d</span>;
  if (d===0) return <span style={{background:"#fff7ed",color:"#c2410c",border:"1px solid #fed7aa",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>Today!</span>;
  if (d<=3)  return <span style={{background:"#fefce8",color:"#a16207",border:"1px solid #fde68a",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>In {d}d</span>;
  return <span style={{background:"#f0fdf4",color:"#15803d",border:"1px solid #bbf7d0",borderRadius:6,padding:"2px 8px",fontSize:11}}>In {d}d</span>;
}
function StagePill({ id }) {
  const s = STAGES.find(x=>x.id===id);
  if (!s) return null;
  return <span style={{background:s.bg,color:s.dot,border:`1px solid ${s.color}60`,borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>{s.label}</span>;
}
function TierBadge({ tier }) {
  if (!tier) return null;
  const t = TIERS.find(x=>x.id===tier);
  if (!t) return null;
  return <span style={{background:t.bg,color:t.dot,border:`1px solid ${t.color}80`,borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>{t.icon} {t.label}</span>;
}

function buildTelegramMsg(p, referrer, referrals, allPeople) {
  const stage = STAGES.find(s=>s.id===p.stage)?.label||p.stage;
  const age = getAge(p);
  return encodeURIComponent([
    `👤 *${p.name}*${age!==null?` · ${age}y`:""}`,
    p.occupation?`💼 ${p.occupation}`:null,
    p.contact?`📱 ${p.contact}`:null,
    `📊 Stage: ${stage}`,
    referrer?`🤝 Referred by: ${referrer.name}`:(p.howKnow?`🤝 Source: ${p.howKnow}`:null),
    ``,
    p.followUpDate?`📅 Follow-up: ${fmt(p.followUpDate)}`:null,
    p.followUpTopic?`🎯 Topic: ${p.followUpTopic}`:null,
    ``,
    p.keyPeople?`👥 Key people: ${p.keyPeople}`:null,
    p.keyMilestones?`⭐ Milestones: ${p.keyMilestones}`:null,
    p.notes?`📝 Notes: ${p.notes}`:null,
    referrals?.length>0?`\n🔗 Referrals: ${referrals.map(r=>r.name).join(", ")}`:null,
  ].filter(Boolean).join("\n"));
}

// ─── Profile Modal ────────────────────────────────────────────────────────────
function ProfileModal({ person, allPeople, families, onClose, onEdit, onViewProfile }) {
  const referrer = person.referredById ? allPeople.find(p=>p.id===person.referredById) : null;
  const referrals = allPeople.filter(p=>p.referredById===person.id);
  const family = person.familyId ? families.find(f=>f.id===person.familyId) : null;
  const familyMembers = family ? allPeople.filter(p=>p.familyId===person.familyId&&p.id!==person.id) : [];
  const stage = STAGES.find(s=>s.id===person.stage);
  const msg = buildTelegramMsg(person, referrer, referrals, allPeople);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.35)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:20,width:"100%",maxWidth:520,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.15)"}}>
        <div style={{height:6,background:stage?.color||"#e5e7eb",borderRadius:"20px 20px 0 0"}} />
        <div style={{padding:"28px 28px 24px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
            <div style={{display:"flex",gap:14,alignItems:"center"}}>
              <Avatar name={person.name} size={52} />
              <div>
                <div style={{fontWeight:800,fontSize:20,color:"#111827",fontFamily:"'Playfair Display',serif"}}>{person.name}</div>
                <div style={{color:"#6b7280",fontSize:13,marginTop:2}}>{person.occupation||"—"}</div>
                <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
                  <StagePill id={person.stage} />
                  {person.tier&&<TierBadge tier={person.tier} />}
                  {family&&<span style={{background:"#fdf4ff",color:"#7e22ce",border:"1px solid #e9d5ff",borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600}}>🏠 {family.name}</span>}
                </div>
              </div>
            </div>
            <button onClick={onClose} style={{background:"#f3f4f6",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:18,color:"#6b7280",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>×</button>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {[
              ["Contact", person.contact],
              ["Birthday", fmtBirthday(person) ? `${fmtBirthday(person)}${getAge(person)!==null?" · "+getAge(person)+"y":""}` : null],
              ["How I know them", person.howKnow],
              ["Key people", person.keyPeople],
            ].map(([l,v])=>v?(
              <div key={l} style={{background:"#f9fafb",borderRadius:10,padding:"10px 14px"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:3}}>{l}</div>
                <div style={{fontSize:13,color:"#374151",fontWeight:500}}>{v}</div>
              </div>
            ):null)}
          </div>

          {person.keyMilestones&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"10px 14px",marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>Key milestones</div>
            <div style={{fontSize:13,color:"#374151"}}>{person.keyMilestones}</div>
          </div>}

          {person.lastMeetup&&<div style={{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:16}}>🤝</span>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:"#0369a1",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:2}}>Last meetup</div>
              <div style={{fontSize:13,color:"#374151",fontWeight:600}}>{fmt(person.lastMeetup)}</div>
            </div>
          </div>}

          {(person.followUpTopic||person.followUpDate)&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#92400e",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Next follow-up</div>
            {person.followUpDate&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:13,fontWeight:700,color:"#374151"}}>{fmt(person.followUpDate)}</span><Badge date={person.followUpDate}/></div>}
            {person.followUpTopic&&<div style={{fontSize:13,color:"#78350f"}}>{person.followUpTopic}</div>}
          </div>}

          {/* Family */}
          {family&&familyMembers.length>0&&<div style={{borderTop:"1px solid #f3f4f6",paddingTop:14,marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>🏠 {family.name}</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {familyMembers.map(m=>(
                <button key={m.id} onClick={()=>onViewProfile(m)} style={{display:"flex",alignItems:"center",gap:10,background:"#fdf4ff",border:"1px solid #e9d5ff",borderRadius:10,padding:"8px 12px",cursor:"pointer",textAlign:"left"}}>
                  <Avatar name={m.name} size={28}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:13,color:"#111827"}}>{m.name}</div>
                    <div style={{fontSize:12,color:"#6b7280"}}>{m.occupation||"—"}</div>
                  </div>
                  <StagePill id={m.stage}/>
                  <span style={{color:"#7e22ce",fontSize:12,fontWeight:600,marginLeft:4}}>→</span>
                </button>
              ))}
            </div>
          </div>}

          {/* Referral network */}
          <div style={{borderTop:"1px solid #f3f4f6",paddingTop:14,marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>Referral network</div>
            {referrer&&<div style={{marginBottom:10}}>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:6}}>Referred by</div>
              <button onClick={()=>onViewProfile(referrer)} style={{display:"flex",alignItems:"center",gap:10,background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"8px 12px",cursor:"pointer",width:"100%",textAlign:"left"}}>
                <Avatar name={referrer.name} size={28}/>
                <div><div style={{fontWeight:700,fontSize:13,color:"#111827"}}>{referrer.name}</div><div style={{fontSize:12,color:"#6b7280"}}>{referrer.occupation}</div></div>
                <span style={{marginLeft:"auto",color:"#16a34a",fontSize:12,fontWeight:600}}>View →</span>
              </button>
            </div>}
            {referrals.length>0&&<div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:6}}>{referrals.length} referral{referrals.length>1?"s":""} sent your way</div>
              {referrals.map(r=>(
                <button key={r.id} onClick={()=>onViewProfile(r)} style={{display:"flex",alignItems:"center",gap:10,background:"#f5f3ff",border:"1px solid #ddd6fe",borderRadius:10,padding:"8px 12px",cursor:"pointer",textAlign:"left",width:"100%",marginBottom:6}}>
                  <Avatar name={r.name} size={26}/>
                  <div style={{fontWeight:600,fontSize:13,color:"#111827",flex:1}}>{r.name}</div>
                  <StagePill id={r.stage}/>
                  <span style={{color:"#7c3aed",fontSize:12,fontWeight:600,marginLeft:4}}>→</span>
                </button>
              ))}
            </div>}
            {!referrer&&referrals.length===0&&<div style={{fontSize:13,color:"#d1d5db",fontStyle:"italic"}}>No referral activity yet</div>}
          </div>

          {person.notes&&<div style={{background:"#f8fafc",borderRadius:10,padding:"10px 14px",marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:3}}>Notes</div>
            <div style={{fontSize:13,color:"#374151"}}>{person.notes}</div>
          </div>}

          {person.stage==="client"&&person.emergencyContacts?.some(ec=>ec.name)&&(
            <div style={{borderTop:"1px solid #f3f4f6",paddingTop:14,marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>🚨 Emergency Contacts</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {person.emergencyContacts.filter(ec=>ec.name).map((ec,i)=>(
                  <div key={i} style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:"#fee2e2",color:"#dc2626",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13,color:"#111827"}}>{ec.name}</div>
                      {ec.relation&&<div style={{fontSize:12,color:"#9ca3af"}}>{ec.relation}</div>}
                    </div>
                    {ec.contact&&<a href={`tel:${ec.contact}`} style={{fontSize:13,color:"#dc2626",fontWeight:600,textDecoration:"none"}}>{ec.contact}</a>}
                  </div>
                ))}
              </div>
            </div>
          )}

          {person.stage==="client"&&(person.policies?.length>0||person.policySummaryLink)&&(
            <div style={{borderTop:"1px solid #f3f4f6",paddingTop:14,marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style={{fontSize:12,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em"}}>🛡 AIA Policies</div>
                {person.policySummaryLink&&<a href={person.policySummaryLink} target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:"#2563eb",fontWeight:600,textDecoration:"none",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:7,padding:"4px 10px"}}>📄 Policy Summary →</a>}
              </div>
              {person.policies?.length>0&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
                {person.policies.map((pol,i)=>{
                  const cc = pol.category?POLICY_CAT_COLOR(pol.category):null;
                  return (
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,background:"#f8fafc",border:"1px solid #e5e7eb",borderRadius:10,padding:"9px 14px"}}>
                      <span style={{fontSize:14}}>📋</span>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}>
                          <span style={{fontWeight:600,fontSize:13,color:"#111827"}}>{pol.name}</span>
                          {pol.category&&cc&&<span style={{background:cc.bg,color:cc.dot,border:`1px solid ${cc.border}`,borderRadius:20,padding:"1px 8px",fontSize:11,fontWeight:700}}>{pol.category}</span>}
                        </div>
                        {pol.purchaseDate&&<div style={{fontSize:12,color:"#9ca3af"}}>Inception: {fmt(pol.purchaseDate)}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>}
            </div>
          )}

          {person.lastUpdated&&<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:14,background:"#f8fafc",border:"1px solid #e5e7eb",borderRadius:10,padding:"9px 14px"}}>
            <span style={{fontSize:13}}>🕐</span>
            <span style={{fontSize:12,color:"#6b7280"}}>Last updated</span>
            <span style={{fontSize:12,fontWeight:700,color:"#374151",marginLeft:"auto"}}>{new Date(person.lastUpdated).toLocaleDateString("en-SG",{day:"numeric",month:"short",year:"numeric"})}</span>
          </div>}

          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={()=>onEdit(person)} style={{flex:1,background:"#111827",color:"#fff",border:"none",borderRadius:10,padding:"11px",fontWeight:700,fontSize:14,cursor:"pointer"}}>Edit</button>
            {person.inLibrary&&<a href={`https://t.me/share/url?url=&text=${msg}`} target="_blank" rel="noopener noreferrer"
              style={{flex:1,background:"#e0f7fa",color:"#0277bd",border:"1px solid #b2ebf2",borderRadius:10,padding:"11px",fontWeight:700,fontSize:14,cursor:"pointer",textDecoration:"none",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
              Telegram
            </a>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Referred-By Search Input ─────────────────────────────────────────────────
function ReferredBySearch({ value, allPeople, excludeId, onChange }) {
  const [query, setQuery] = useState("");
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const selected = value ? allPeople.find(p=>p.id===value) : null;

  useEffect(() => {
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const filtered = allPeople.filter(p =>
    p.inLibrary && p.id !== excludeId &&
    (query === "" || p.name.toLowerCase().includes(query.toLowerCase()) || (p.occupation||"").toLowerCase().includes(query.toLowerCase()))
  ).slice(0, 8);

  const inp = {width:"100%",background:"#fff",border:"1px solid #d1d5db",borderRadius:8,color:"#111827",padding:"9px 12px",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"inherit"};

  if (selected && !open) {
    return (
      <div style={{display:"flex",alignItems:"center",gap:8,background:"#f5f3ff",border:"1px solid #ddd6fe",borderRadius:8,padding:"8px 12px"}}>
        <Avatar name={selected.name} size={24}/>
        <span style={{fontSize:14,fontWeight:600,color:"#111827",flex:1}}>{selected.name}</span>
        <span style={{fontSize:12,color:"#7c3aed"}}>{STAGES.find(s=>s.id===selected.stage)?.label}</span>
        <button onClick={()=>onChange(null)} style={{background:"none",border:"none",color:"#9ca3af",cursor:"pointer",fontSize:16,padding:"0 2px",lineHeight:1}}>×</button>
      </div>
    );
  }

  return (
    <div ref={ref} style={{position:"relative"}}>
      <input
        style={inp}
        value={query}
        onChange={e=>{setQuery(e.target.value);setOpen(true);}}
        onFocus={()=>setOpen(true)}
        placeholder="Search by name or company..."
      />
      {open && filtered.length > 0 && (
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"#fff",border:"1px solid #e5e7eb",borderRadius:10,boxShadow:"0 8px 24px rgba(0,0,0,0.1)",zIndex:999,overflow:"hidden"}}>
          {filtered.map(p=>(
            <button key={p.id} onMouseDown={()=>{onChange(p.id);setQuery("");setOpen(false);}}
              style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"9px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left",transition:"background 0.1s"}}
              onMouseEnter={e=>e.currentTarget.style.background="#f5f3ff"}
              onMouseLeave={e=>e.currentTarget.style.background="none"}>
              <Avatar name={p.name} size={26}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:"#111827"}}>{p.name}</div>
                <div style={{fontSize:12,color:"#9ca3af"}}>{p.occupation||"—"}</div>
              </div>
              <StagePill id={p.stage}/>
            </button>
          ))}
          {query && <button onMouseDown={()=>{onChange(null);setQuery("");setOpen(false);}} style={{display:"block",width:"100%",padding:"8px 14px",background:"#fef2f2",border:"none",borderTop:"1px solid #fee2e2",cursor:"pointer",color:"#dc2626",fontSize:12,fontWeight:600,textAlign:"left"}}>✕ Clear referral</button>}
        </div>
      )}
    </div>
  );
}

// ─── Family Group Builder (drag & drop) ──────────────────────────────────────
function FamilyForm({ initial, allPeople, currentFamilies, onSave, onClose }) {
  const [name, setName] = useState(initial?.name || "");
  const [notes, setNotes] = useState(initial?.notes || "");
  const [memberIds, setMemberIds] = useState(() => {
    if (initial?.id) return allPeople.filter(p=>p.familyId===initial.id).map(p=>p.id);
    return [];
  });
  const [search, setSearch] = useState("");
  const [dragOver, setDragOver] = useState(false);
  const [draggingId, setDraggingId] = useState(null);

  const inp = {width:"100%",background:"#fff",border:"1px solid #d1d5db",borderRadius:8,color:"#111827",padding:"9px 12px",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"inherit"};
  const lbl = {fontSize:12,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:5,display:"block"};

  // People not yet in this family
  const available = allPeople.filter(p =>
    p.inLibrary &&
    !memberIds.includes(p.id) &&
    (search === "" || p.name.toLowerCase().includes(search.toLowerCase()) || (p.occupation||"").toLowerCase().includes(search.toLowerCase()))
  );
  const members = allPeople.filter(p => memberIds.includes(p.id));

  const addMember = (id) => setMemberIds(prev => prev.includes(id) ? prev : [...prev, id]);
  const removeMember = (id) => setMemberIds(prev => prev.filter(x => x !== id));

  const handleSave = () => {
    if (!name.trim()) { alert("Family name is required."); return; }
    onSave({ id: initial?.id || Date.now(), name, notes, memberIds });
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:20,width:"100%",maxWidth:680,maxHeight:"92vh",overflowY:"auto",padding:"32px",boxShadow:"0 20px 60px rgba(0,0,0,0.15)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <h2 style={{margin:0,fontSize:22,fontWeight:800,color:"#111827",fontFamily:"'Playfair Display',serif"}}>{initial?.id?"Edit Family Group":"Create Family Group"}</h2>
          <button onClick={onClose} style={{background:"#f3f4f6",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:18,color:"#6b7280",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>

        {/* Name + notes */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:24}}>
          <div style={{gridColumn:"1/-1"}}><label style={lbl}>Family Group Name *</label><input style={inp} value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Tan Family, Lee Household"/></div>
          <div style={{gridColumn:"1/-1"}}><label style={lbl}>Notes</label><input style={inp} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="e.g. All referred by Marcus"/></div>
        </div>

        {/* Drag & drop area */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>

          {/* Left: available people */}
          <div>
            <label style={lbl}>Library — drag to add</label>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Filter people..." style={{...inp,marginBottom:10}}/>
            <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:280,overflowY:"auto"}}>
              {available.length===0&&<div style={{fontSize:13,color:"#d1d5db",textAlign:"center",padding:"20px 0"}}>No more people to add</div>}
              {available.map(p=>(
                <div key={p.id}
                  draggable
                  onDragStart={()=>setDraggingId(p.id)}
                  onDragEnd={()=>setDraggingId(null)}
                  style={{display:"flex",alignItems:"center",gap:9,background:draggingId===p.id?"#f0f9ff":"#f9fafb",border:`1px solid ${draggingId===p.id?"#93c5fd":"#e5e7eb"}`,borderRadius:9,padding:"8px 10px",cursor:"grab",transition:"all 0.1s",userSelect:"none"}}>
                  <span style={{fontSize:14,color:"#9ca3af"}}>⠿</span>
                  <Avatar name={p.name} size={26}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#111827",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                    <div style={{fontSize:11,color:"#9ca3af"}}>{p.occupation||"—"}</div>
                  </div>
                  <StagePill id={p.stage}/>
                  <button onMouseDown={e=>{e.stopPropagation();addMember(p.id);}} style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:6,color:"#16a34a",width:24,height:24,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
                </div>
              ))}
            </div>
          </div>

          {/* Right: drop zone / current members */}
          <div>
            <label style={lbl}>Family members ({members.length})</label>
            <div
              onDragOver={e=>{e.preventDefault();setDragOver(true);}}
              onDragLeave={()=>setDragOver(false)}
              onDrop={e=>{e.preventDefault();setDragOver(false);if(draggingId)addMember(draggingId);setDraggingId(null);}}
              style={{minHeight:180,border:`2px dashed ${dragOver?"#a78bfa":"#e5e7eb"}`,borderRadius:12,background:dragOver?"#fdf4ff":"#fafafa",padding:"10px",transition:"all 0.15s",display:"flex",flexDirection:"column",gap:6}}>
              {members.length===0&&(
                <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#d1d5db",fontSize:13,gap:6}}>
                  <span style={{fontSize:28}}>🏠</span>
                  Drag people here or click +
                </div>
              )}
              {members.map(p=>(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:9,background:"#fff",border:"1px solid #e9d5ff",borderRadius:9,padding:"8px 10px"}}>
                  <Avatar name={p.name} size={26}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#111827",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                    <div style={{fontSize:11,color:"#9ca3af"}}>{p.occupation||"—"}</div>
                  </div>
                  <StagePill id={p.stage}/>
                  <button onClick={()=>removeMember(p.id)} style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:6,color:"#dc2626",width:24,height:24,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>×</button>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div style={{display:"flex",gap:10,marginTop:24}}>
          <button onClick={handleSave} style={{flex:1,background:"#111827",color:"#fff",border:"none",borderRadius:10,padding:"13px",fontWeight:700,fontSize:15,cursor:"pointer"}}>{initial?.id?"Save Changes":"Create Family Group"}</button>
          <button onClick={onClose} style={{background:"#f3f4f6",color:"#6b7280",border:"none",borderRadius:10,padding:"13px 20px",fontWeight:600,cursor:"pointer"}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ─── Add Non-Library Member Modal ─────────────────────────────────────────────
function QuickAddMember({ familyId, allPeople, onSave, onClose }) {
  const [mode, setMode] = useState("new"); // "new" | "existing"
  const [f, setF] = useState({name:"",age:"",occupation:"",stage:"notapproached",notes:"",familyId,inLibrary:false});

    name: r.name,
    birthday: r.birthday||"",
    ageOnly: r.age_only||"",
    contact: r.contact||"",

    inLibrary: r.in_library!==false,
    lastUpdated: r.last_updated||null,
    emergencyContacts: r.emergency_contacts||[{name:"",relation:"",contact:""},{name:"",relation:"",contact:""},{name:"",relation:"",contact:""}],
    lastMeetup: r.last_meetup||"",
    policySummaryLink: r.policy_summary_link||"",
    policies: r.policies||[],
  };
}
function famToRow(f) { return { id: f.id, name: f.name, notes: f.notes||null }; }
function famFromRow(r) { return { id: r.id, name: r.name, notes: r.notes||"" }; }

async function sbFetch(path, opts={}) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, { headers: SB_HEADERS, ...opts });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  return res.status===204 ? null : res.json();
}

function App() {
  const [people,   setPeople]   = useState([]);
  const [families, setFamilies] = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [syncMsg,  setSyncMsg]  = useState("");

  // ── Load all data from Supabase on mount ──────────────────────────────────
  useEffect(() => {
    async function loadAll() {
      try {
        const [pRows, fRows] = await Promise.all([
          sbFetch("people?select=*&order=created_at.asc"),
          sbFetch("families?select=*&order=created_at.asc"),
        ]);
        setPeople((pRows||[]).map(fromRow));
        setFamilies((fRows||[]).map(famFromRow));
      } catch(e) {
        console.error("Load error:", e);
        setSyncMsg("⚠️ Could not connect to database. Check your internet connection.");
      } finally {
        setLoading(false);
      }
    }
    loadAll();
  }, []);

  function flash(msg) { setSyncMsg(msg); setTimeout(()=>setSyncMsg(""), 3000); }

  // ── Save / update a person ────────────────────────────────────────────────
  const savePerson = async (data) => {
    try {
      const row = toRow(data);
      const exists = people.find(p=>p.id===data.id);
      if (exists) {
        await sbFetch(`people?id=eq.${data.id}`, { method:"PATCH", body: JSON.stringify(row) });
      } else {
        await sbFetch("people", { method:"POST", body: JSON.stringify(row) });
      }
      setPeople(prev => exists ? prev.map(p=>p.id===data.id?data:p) : [...prev, data]);
      setModal(null);
      if (profile&&profile.id===data.id) setProfile(data);
      flash("✅ Saved to cloud");
    } catch(e) { flash("⚠️ Save failed — check connection"); console.error(e); }
  };

  // ── Save / update a family ────────────────────────────────────────────────
  const saveFamily = async (data) => {
    const { memberIds, ...familyData } = data;
    try {
      const exists = families.find(f=>f.id===familyData.id);
      if (exists) {
        await sbFetch(`families?id=eq.${familyData.id}`, { method:"PATCH", body: JSON.stringify(famToRow(familyData)) });
      } else {
        await sbFetch("families", { method:"POST", body: JSON.stringify(famToRow(familyData)) });
      }
      setFamilies(prev => exists ? prev.map(f=>f.id===familyData.id?familyData:f) : [...prev, familyData]);

      // Update people's familyId
      if (memberIds) {
        const toAdd = memberIds.filter(id => {
          const p = people.find(x=>x.id===id);
          return p && p.familyId !== familyData.id;
        });
        const toRemove = people.filter(p=>p.familyId===familyData.id&&!memberIds.includes(p.id)).map(p=>p.id);

        for (const id of toAdd) {
          await sbFetch(`people?id=eq.${id}`, { method:"PATCH", body: JSON.stringify({family_id: familyData.id}) });
        }
        for (const id of toRemove) {
          await sbFetch(`people?id=eq.${id}`, { method:"PATCH", body: JSON.stringify({family_id: null}) });
        }
        setPeople(prev => prev.map(p => {
          if (memberIds.includes(p.id)) return {...p, familyId: familyData.id};
          if (p.familyId===familyData.id && !memberIds.includes(p.id)) return {...p, familyId: null};
          return p;
        }));
      }
      setModal(null);
      flash("✅ Family saved to cloud");
    } catch(e) { flash("⚠️ Save failed — check connection"); console.error(e); }
  };

  // ── Add family member (quick add) ─────────────────────────────────────────
  const addFamilyMember = async (memberData) => {
    try {
      const exists = people.find(p=>p.id===memberData.id);
      if (exists) {
        await sbFetch(`people?id=eq.${memberData.id}`, { method:"PATCH", body: JSON.stringify({family_id: memberData.familyId}) });
        setPeople(prev=>prev.map(p=>p.id===memberData.id?{...p,familyId:memberData.familyId}:p));
      } else {
        await sbFetch("people", { method:"POST", body: JSON.stringify(toRow(memberData)) });
        setPeople(prev=>[...prev, memberData]);
      }
      setAddMemberFamilyId(null);
      flash("✅ Member added");
    } catch(e) { flash("⚠️ Save failed"); console.error(e); }
  };

  // ── Delete family ─────────────────────────────────────────────────────────
  const deleteFamily = async (id) => {
    if (!confirm("Delete this family group? Members will be unlinked but not deleted.")) return;
    try {
      await sbFetch(`families?id=eq.${id}`, { method:"DELETE" });
      await sbFetch(`people?family_id=eq.${id}`, { method:"PATCH", body: JSON.stringify({family_id: null}) });
      setFamilies(prev=>prev.filter(f=>f.id!==id));
      setPeople(prev=>prev.map(p=>p.familyId===id?{...p,familyId:null}:p));
      flash("🗑 Family deleted");
    } catch(e) { flash("⚠️ Delete failed"); console.error(e); }
  };

  // ── Delete person ─────────────────────────────────────────────────────────
  const deletePerson = async (id) => {
    if (!confirm("Remove this person?")) return;
    try {
      await sbFetch(`people?id=eq.${id}`, { method:"DELETE" });
      setPeople(prev=>prev.filter(p=>p.id!==id));
      setProfile(null);
      flash("🗑 Person removed");
    } catch(e) { flash("⚠️ Delete failed"); console.error(e); }
  };

  const [tab, setTab]           = useState("pipeline");
  const [modal, setModal]       = useState(null);
  const [profile, setProfile]   = useState(null);
  const [addMemberFamilyId, setAddMemberFamilyId] = useState(null);
  const [filterStage, setFilterStage] = useState("all");
  const [filterTier,  setFilterTier]  = useState("all");
  const [filterLastPurchase, setFilterLastPurchase] = useState("all");
  const [sort, setSort]   = useState("date");
  const [search, setSearch] = useState("");
  const [view, setView]   = useState("grid");

  const libraryPeople = people.filter(p=>p.inLibrary);

  const list = useMemo(()=>{
    let l = [...libraryPeople];
    if (filterStage!=="all") l=l.filter(p=>p.stage===filterStage);
    if (filterTier!=="all") l=l.filter(p=>p.stage==="client"&&p.tier===filterTier);
    if (filterLastPurchase!=="all") {
      const now = new Date(); now.setHours(0,0,0,0);
      const days = filterLastPurchase==="30"?30:filterLastPurchase==="90"?90:filterLastPurchase==="180"?180:365;
      l=l.filter(p=>{
        if (p.stage!=="client"||!p.policies?.length) return false;
        const latest = p.policies.map(x=>x.purchaseDate).filter(Boolean).sort().pop();
        if (!latest) return false;
        const diff = (now-new Date(latest+"T00:00:00"))/86400000;
        return diff<=days;
      });
    }
    if (search.trim()) { const q=search.toLowerCase(); l=l.filter(p=>[p.name,p.occupation,p.followUpTopic,p.howKnow].join(" ").toLowerCase().includes(q)); }
    l.sort((a,b)=>{
      if(sort==="date"){if(!a.followUpDate)return 1;if(!b.followUpDate)return -1;return a.followUpDate.localeCompare(b.followUpDate);}
      if(sort==="stage")return STAGES.findIndex(s=>s.id===a.stage)-STAGES.findIndex(s=>s.id===b.stage);
      if(sort==="tier"){const ti=t=>TIERS.findIndex(x=>x.id===t);const ta=ti(a.tier),tb=ti(b.tier);if(ta===-1&&tb===-1)return 0;if(ta===-1)return 1;if(tb===-1)return -1;return tb-ta;}
      if(sort==="age"){const aa=getAge(a),ab=getAge(b);if(aa===null)return 1;if(ab===null)return -1;return aa-ab;}
      return 0;
    });
    return l;
  },[people,filterStage,filterTier,sort,search]);

  const stageCounts = STAGES.filter(s=>s.id!=="notapproached").map(s=>({...s,n:libraryPeople.filter(p=>p.stage===s.id).length}));
  const tierCounts  = TIERS.map(t=>({...t,n:libraryPeople.filter(p=>p.stage==="client"&&p.tier===t.id).length}));
  const urgent = libraryPeople.filter(p=>{const d=daysTo(p.followUpDate);return d!==null&&d<=1;});

  const headerBtnStyle = {background:"transparent",border:"none",padding:"10px 18px",fontSize:14,fontWeight:600,cursor:"pointer",borderBottom:"2px solid transparent",whiteSpace:"nowrap",transition:"color 0.15s"};

  if (loading) return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#f8fafc",gap:16}}>
      <div style={{fontSize:36}}>☁️</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:"#111827"}}>Loading your CMS...</div>
      <div style={{fontSize:14,color:"#9ca3af"}}>Connecting to Supabase</div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#f8fafc",fontFamily:"'DM Sans',sans-serif",color:"#111827"}}>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>

      {/* sync toast */}
      {syncMsg&&<div style={{position:"fixed",bottom:24,right:24,background:"#111827",color:"#fff",borderRadius:12,padding:"12px 20px",fontSize:13,fontWeight:600,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,0.2)"}}>{syncMsg}</div>}

      {/* ── Top Nav ── */}
      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"0 32px"}}>
        <div style={{maxWidth:1200,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:20,paddingBottom:4,flexWrap:"wrap",gap:12}}>
            <div>

              <div style={{fontSize:11,letterSpacing:"0.15em",color:"#dc2626",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Claudiatyx</div>
              <h1 style={{margin:0,fontFamily:"'Playfair Display',serif",fontSize:30,fontWeight:900,color:"#111827",lineHeight:1.1}}>Client Management System</h1>
            </div>
            <div style={{display:"flex",gap:8}}>
              {tab==="pipeline"?(
                <button onClick={()=>setModal("addPerson")} style={{background:"#111827",color:"#fff",border:"none",borderRadius:12,padding:"11px 20px",fontWeight:700,fontSize:14,cursor:"pointer"}}>+ Add Person</button>
              ):(
                <button onClick={()=>setModal("addFamily")} style={{background:"#111827",color:"#fff",border:"none",borderRadius:12,padding:"11px 20px",fontWeight:700,fontSize:14,cursor:"pointer"}}>+ New Family</button>
              )}
            </div>
          </div>

          {/* ── Tab bar ── */}
          <div style={{display:"flex",gap:0,marginTop:8}}>
            <button onClick={()=>setTab("pipeline")} style={{...headerBtnStyle,color:tab==="pipeline"?"#111827":"#9ca3af",borderBottomColor:tab==="pipeline"?"#111827":"transparent"}}>
              👤 Pipeline Library
            </button>
            <button onClick={()=>setTab("families")} style={{...headerBtnStyle,color:tab==="families"?"#7c3aed":"#9ca3af",borderBottomColor:tab==="families"?"#7c3aed":"transparent"}}>
              🏠 Family Trees
              <span style={{marginLeft:6,background:tab==="families"?"#f5f3ff":"#f3f4f6",color:tab==="families"?"#7c3aed":"#9ca3af",borderRadius:20,padding:"1px 8px",fontSize:12}}>{families.length}</span>
            </button>
          </div>
        </div>
      </div>

      {/* ══════════ PIPELINE TAB ══════════ */}
      {tab==="pipeline"&&(<>
        {/* Stage filter tabs */}
        <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"0 32px"}}>
          <div style={{maxWidth:1200,margin:"0 auto"}}>
            {urgent.length>0&&<div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:10,padding:"10px 16px",margin:"12px 0 4px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <span style={{fontSize:14,fontWeight:700,color:"#ea580c"}}>🔔 {urgent.length} due today/tomorrow:</span>
              {urgent.map(p=><button key={p.id} onClick={()=>setProfile(p)} style={{background:"#fff",border:"1px solid #fed7aa",borderRadius:7,padding:"4px 12px",fontSize:13,color:"#9a3412",fontWeight:600,cursor:"pointer"}}>{p.name} →</button>)}
            </div>}
            <div style={{display:"flex",gap:0,overflowX:"auto"}}>
              <button onClick={()=>{setFilterStage("all");setFilterTier("all")}} style={{...headerBtnStyle,fontSize:13,color:filterStage==="all"&&filterTier==="all"?"#111827":"#9ca3af",borderBottomColor:filterStage==="all"&&filterTier==="all"?"#111827":"transparent",fontWeight:filterStage==="all"&&filterTier==="all"?700:500}}>All ({libraryPeople.length})</button>
              {stageCounts.filter(s=>s.n>0).map(s=>(
                <button key={s.id} onClick={()=>{setFilterStage(filterStage===s.id?"all":s.id);setFilterTier("all")}}
                  style={{...headerBtnStyle,fontSize:13,color:filterStage===s.id?s.dot:"#9ca3af",borderBottomColor:filterStage===s.id?s.dot:"transparent",fontWeight:filterStage===s.id?700:500,display:"flex",alignItems:"center",gap:5}}>
                  <span style={{width:7,height:7,borderRadius:"50%",background:s.dot}}/>{s.label} <span style={{fontSize:12,opacity:.7}}>({s.n})</span>
                </button>
              ))}
            </div>
            {filterStage==="client"&&<div style={{display:"flex",gap:6,padding:"8px 0 12px",borderTop:"1px solid #f3f4f6",flexWrap:"wrap"}}>
              <span style={{fontSize:12,color:"#9ca3af",alignSelf:"center",marginRight:4}}>Tier:</span>
              <button onClick={()=>setFilterTier("all")} style={{background:filterTier==="all"?"#111827":"#f3f4f6",color:filterTier==="all"?"#fff":"#6b7280",border:"none",borderRadius:20,padding:"4px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>All</button>
              {tierCounts.map(t=><button key={t.id} onClick={()=>setFilterTier(filterTier===t.id?"all":t.id)} style={{background:filterTier===t.id?t.dot:"#f3f4f6",color:filterTier===t.id?"#fff":t.dot,border:"none",borderRadius:20,padding:"4px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{t.icon} {t.label} ({t.n})</button>)}
              <span style={{fontSize:12,color:"#9ca3af",alignSelf:"center",marginLeft:8,marginRight:4}}>Last purchase:</span>
              {[["all","All"],["30","30d"],["90","90d"],["180","6mo"],["365","1yr"]].map(([v,l])=>(
                <button key={v} onClick={()=>setFilterLastPurchase(v)} style={{background:filterLastPurchase===v?"#16a34a":"#f3f4f6",color:filterLastPurchase===v?"#fff":"#6b7280",border:"none",borderRadius:20,padding:"4px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{l}</button>
              ))}
            </div>}
          </div>
        </div>

        {/* Toolbar */}
        <div style={{padding:"14px 32px",maxWidth:1200,margin:"0 auto",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Search name, company, topic..."
            style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:9,color:"#111827",padding:"9px 14px",fontSize:14,outline:"none",minWidth:240,flex:"0 1 300px"}}/>
          <select value={sort} onChange={e=>setSort(e.target.value)} style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:9,color:"#6b7280",padding:"9px 12px",fontSize:13,outline:"none",cursor:"pointer"}}>
            <option value="date">Sort: Follow-up date</option>
            <option value="stage">Sort: Pipeline stage</option>
            <option value="tier">Sort: Client tier</option>
            <option value="age">Sort: Age</option>
          </select>
          <div style={{marginLeft:"auto",display:"flex",gap:2,background:"#fff",border:"1px solid #e5e7eb",borderRadius:9,padding:3}}>
            {[["grid","⊞  Cards"],["table","≡  Table"]].map(([v,l])=>(
              <button key={v} onClick={()=>setView(v)} style={{background:view===v?"#111827":"transparent",color:view===v?"#fff":"#9ca3af",border:"none",borderRadius:7,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{l}</button>
            ))}
          </div>
        </div>

        {/* Cards / Table */}
        <div style={{padding:"0 32px 48px",maxWidth:1200,margin:"0 auto"}}>
          {list.length===0?(
            <div style={{textAlign:"center",padding:"80px 0",color:"#9ca3af"}}><div style={{fontSize:40,marginBottom:12}}>🌱</div><div style={{fontSize:17,fontWeight:600,color:"#6b7280"}}>No people found</div></div>
          ):view==="table"?(
            <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:14,overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr style={{background:"#f9fafb",borderBottom:"1px solid #e5e7eb"}}>
                  {["Name","Age","Stage","Occupation","Follow-Up Date","Topic","Referred By","Referrals","Family",""].map((h,i)=>(
                    <th key={i} style={{padding:"11px 16px",textAlign:"left",fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.06em",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {list.map((p,i)=>{
                    const ref=p.referredById?people.find(x=>x.id===p.referredById):null;
                    const rc=people.filter(x=>x.referredById===p.id).length;
                    const fam=p.familyId?families.find(f=>f.id===p.familyId):null;
                    return(
                      <tr key={p.id} style={{borderBottom:"1px solid #f3f4f6",background:i%2===0?"#fff":"#fafafa",cursor:"pointer"}} onClick={()=>setProfile(p)}>
                        <td style={{padding:"13px 16px",fontWeight:600,color:"#111827",fontSize:14}}><div style={{display:"flex",alignItems:"center",gap:8}}><Avatar name={p.name} size={26}/>{p.name}</div></td>
                        <td style={{padding:"13px 16px",color:"#9ca3af",fontSize:13}}>{getAge(p)!==null?`${getAge(p)}y`:"—"}</td>
                        <td style={{padding:"13px 16px"}}><StagePill id={p.stage}/></td>
                        <td style={{padding:"13px 16px",color:"#6b7280",fontSize:13}}>{p.occupation||"—"}</td>
                        <td style={{padding:"13px 16px",whiteSpace:"nowrap"}}><div style={{display:"flex",flexDirection:"column",gap:2}}><span style={{fontSize:12,color:"#6b7280",fontWeight:600}}>{fmt(p.followUpDate)}</span><Badge date={p.followUpDate}/></div></td>
                        <td style={{padding:"13px 16px",color:"#6b7280",fontSize:13,maxWidth:160}}>{p.followUpTopic||"—"}</td>
                        <td style={{padding:"13px 16px"}}>{ref?<span style={{fontSize:12,color:"#7c3aed",background:"#f5f3ff",border:"1px solid #ddd6fe",borderRadius:6,padding:"2px 8px"}}>🔗 {ref.name}</span>:<span style={{color:"#d1d5db",fontSize:13}}>—</span>}</td>
                        <td style={{padding:"13px 16px",textAlign:"center"}}>{rc>0?<span style={{fontSize:13,fontWeight:700,color:"#059669"}}>{rc}</span>:<span style={{color:"#d1d5db"}}>—</span>}</td>
                        <td style={{padding:"13px 16px"}}>{fam?<span style={{fontSize:12,color:"#7e22ce",background:"#fdf4ff",border:"1px solid #e9d5ff",borderRadius:6,padding:"2px 8px"}}>🏠 {fam.name}</span>:<span style={{color:"#d1d5db",fontSize:13}}>—</span>}</td>
                        <td style={{padding:"13px 16px"}} onClick={e=>e.stopPropagation()}><button onClick={()=>setModal(p)} style={{background:"#eff6ff",border:"none",color:"#2563eb",borderRadius:6,padding:"5px 10px",fontSize:12,cursor:"pointer",fontWeight:600}}>Edit</button></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(310px,1fr))",gap:14}}>
              {list.map(p=><PipelineCard key={p.id} p={p} allPeople={people} onOpenProfile={setProfile}/>)}
            </div>
          )}
        </div>
      </>)}

      {/* ══════════ FAMILIES TAB ══════════ */}
      {tab==="families"&&(
        <div style={{padding:"28px 32px 48px",maxWidth:1200,margin:"0 auto"}}>
          {/* Summary strip */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:28}}>
            {[
              ["Total families", families.length, "#7c3aed","#f5f3ff"],
              ["Fully protected", families.filter(fam=>{const m=people.filter(p=>p.familyId===fam.id);return m.length>0&&m.every(p=>p.stage==="client");}).length,"#16a34a","#f0fdf4"],
              ["Partially protected", families.filter(fam=>{const m=people.filter(p=>p.familyId===fam.id);const c=m.filter(p=>p.stage==="client").length;return c>0&&c<m.length;}).length,"#d97706","#fffbeb"],
              ["Not yet clients", families.filter(fam=>{const m=people.filter(p=>p.familyId===fam.id);return m.length>0&&m.every(p=>p.stage!=="client");}).length,"#dc2626","#fef2f2"],
            ].map(([label,val,color,bg])=>(
              <div key={label} style={{background:bg,border:`1px solid ${color}30`,borderRadius:12,padding:"14px 18px"}}>
                <div style={{fontSize:12,color:"#9ca3af",fontWeight:600,marginBottom:4}}>{label}</div>
                <div style={{fontSize:28,fontWeight:800,color,fontFamily:"'Playfair Display',serif"}}>{val}</div>
              </div>
            ))}
          </div>

          {families.length===0?(
            <div style={{textAlign:"center",padding:"80px 0",color:"#9ca3af"}}>
              <div style={{fontSize:40,marginBottom:12}}>🏠</div>
              <div style={{fontSize:17,fontWeight:600,color:"#6b7280"}}>No families yet</div>
              <div style={{fontSize:14,marginTop:6}}>Click + New Family to create your first family group</div>
            </div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(360px,1fr))",gap:16}}>
              {families.map(fam=>(
                <FamilyTreeCard key={fam.id} family={fam} allPeople={people}
                  onViewProfile={setProfile}
                  onAddMember={setAddMemberFamilyId}
                  onDeleteFamily={deleteFamily}/>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── Modals ── */}
      {modal==="addPerson"&&<PersonForm allPeople={people} families={families} onSave={savePerson} onDelete={deletePerson} onClose={()=>setModal(null)}/>}
      {modal==="addFamily"&&<FamilyForm allPeople={people} currentFamilies={families} onSave={saveFamily} onClose={()=>setModal(null)}/>}
      {modal&&modal!=="addPerson"&&modal!=="addFamily"&&<PersonForm initial={modal} allPeople={people} families={families} onSave={savePerson} onDelete={deletePerson} onClose={()=>setModal(null)}/>}
      {addMemberFamilyId&&<QuickAddMember familyId={addMemberFamilyId} allPeople={people} onSave={addFamilyMember} onClose={()=>setAddMemberFamilyId(null)}/>}
      {profile&&<ProfileModal person={profile} allPeople={people} families={families} onClose={()=>setProfile(null)} onEdit={p=>{setProfile(null);setModal(p);}} onViewProfile={setProfile}/>}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
